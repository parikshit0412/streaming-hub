version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: streamhub-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - host-app
      - browse-app
      - settings-app
      - watchlist-app
    restart: unless-stopped

  host-app:
    build:
      context: .
      dockerfile: apps/host/Dockerfile
    container_name: streamhub-host-app
    restart: unless-stopped

  browse-app:
    build:
      context: .
      dockerfile: apps/browse/Dockerfile
    container_name: streamhub-browse-app
    restart: unless-stopped

  settings-app:
    build:
      context: .
      dockerfile: apps/settings/Dockerfile
    container_name: streamhub-settings-app
    restart: unless-stopped

  watchlist-app:
    build:
      context: .
      dockerfile: apps/watchlist/Dockerfile
    container_name: streamhub-watchlist-app
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: grafana.Dockerfile
    container_name: streamhub-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/streaming_metrics.json
    restart: unless-stopped
